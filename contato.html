<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/icone.png" />
    <title>Contato</title>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="body-contato">
    <header class="header">
      <a href="index.html" class="logo-clicavel">
        <img class="header-logo" src="/img/logo.png" alt="Logo" />
      </a>
      <button id="tema">
        <i class="ph ph-moon"></i>
        <i class="ph ph-sun"></i>
      </button>
      <i class="ph ph-list menu-hamburguer" onclick="clickMenu()"></i>
      <nav class="header-nav">
        <ul class="header-menu">
          <li class="header-item">
            <a class="header-link" href="index.html">Home</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="sobre.html">Sobre</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="perguntas.html">Perguntas</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="avaliacoes.html">Avaliações</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="contato.html">Contato</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="jogar.html">Jogar</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="container">
      <p class="titulo-contato">CONTATO</p>
      <p class="subtitulo-contato">
        Tem alguma dúvida, sugestão ou problema? Fale com a gente 🤔
      </p>
      <div class="container-contato">
        <div class="lado-esquerdo">
          <img src="img/modelo.avif" alt="personagem" class="personagem" />
          <p class="fala-personagem">
            Precisa de ajuda? Me manda uma mensagem!
          </p>
        </div>

        <form class="formulario" id="formulario">
          <div class="campo">
            <label class="label-formulario" for="tipo">Tipo de contato</label>
            <select id="tipo" name="tipo" required class="input-formulario">
              <option value="">Selecione</option>
              <option>Dúvida</option>
              <option>Sugestão</option>
              <option>Problema</option>
            </select>
          </div>

          <div class="campo">
            <label class="label-formulario" for="nome">Nome</label>
            <input
              class="input-formulario"
              type="text"
              id="nome"
              name="nome"
              placeholder="Seu nome"
              autocomplete="off"
              required
            />
          </div>

          <div class="campo">
            <label class="label-formulario" for="email">Email</label>
            <input
              class="input-formulario"
              type="email"
              id="email"
              name="email"
              placeholder="seuemail@email.com"
              autocomplete="off"
              required
            />
          </div>

          <div class="campo">
            <label class="label-formulario" for="mensagem">Mensagem</label>
            <textarea
              class="input-formulario textarea-formulario"
              id="mensagem"
              name="mensagem"
              placeholder="Escreva sua mensagem aqui..."
              autocomplete="off"
              required
            ></textarea>
          </div>

          <button type="submit" class="botao-formulario">ENVIAR</button>
        </form>
      </div>
    </main>
    <footer class="footer">
      <p class="footer-texto">Candy Factory Adventure</p>
      <p class="footer-texto">Nossas Redes Sociais</p>

      <div class="footer-redes">
        <i class="ph ph-instagram-logo"></i>
        <i class="ph ph-youtube-logo"></i>
        <i class="ph ph-facebook-logo"></i>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
