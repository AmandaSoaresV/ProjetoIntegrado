<!DOCTYPE html>
<html lang="pt-br">
<head>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/icone.png" />
  <title>Contato</title>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bodyContato">
    <header class="header">
      <img class="header-logo" src="/img/logo.png" alt="Logo"  />

      <nav class="header-nav">
        <ul class="header-menu">
          <li class="header-item">
            <a class="header-link" href="index.html">Home</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="sobre.html">Sobre</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="perguntas.html">Perguntas</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="avaliacoes.html">Avaliações</a>
          </li>

          <li class="header-item">
            <a class="header-link" href="contato.html">Contato</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="container">
      <p class="titulo-contato">Contato</p>
      <div class="container-contato">
        <img src="img/modelo.avif" width="400" alt="personagem" class="personagem" />

        <form class="formulario">
          <div class="campo">
            <label class="label-formulario" for="nome">Nome</label>
            <input class="input-formulario" type="text" id="nome" required />
          </div>

          <div class="campo">
            <label class="label-formulario" for="email">Email</label>
            <input class="input-formulario" type="email" id="email" required />
          </div>

          <div class="campo">
            <label class="label-formulario" for="mensagem">Mensagem</label>
            <textarea class="input-formulario textarea-formulario" id="mensagem" required></textarea>
          </div>

          <button type="submit" class="botao-formulario">ENVIAR</button>
        </form>
      </div>
    </main>
    <footer class="footer">
      <p class="footer-texto">Nome do jogo</p>
      <p class="footer-texto">Nossas Redes Sociais</p>

      <div class="footer-redes">
        <i class="ph ph-instagram-logo"></i>
        <i class="ph ph-youtube-logo"></i>
        <i class="ph ph-facebook-logo"></i>
      </div>
    </footer>
  </body>
</html>
